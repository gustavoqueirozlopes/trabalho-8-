<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro</title>

<style>
  body {
    font-family: Arial;
    background: #f1f5f9;
    text-align: center;
  }

  .container {
    background: white;
    padding: 30px;
    margin: 50px auto;
    width: 300px;
    border-radius: 10px;
    box-shadow: 0 0 10px #ccc;
  }

  input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
  }

  button {
    padding: 10px;
    width: 100%;
    background: #1e40af;
    color: white;
    border: none;
    cursor: pointer;
    margin-top: 10px;
  }

  button:hover {
    background: #1e3a8a;
  }
</style>
</head>

<body>

<div class="container">
  <h2>Cadastro</h2>

  <input type="text" id="nome" placeholder="Digite seu nome">
  <input type="number" id="idade" placeholder="Digite sua idade">
  <input type="email" id="email" placeholder="Digite seu email">

  <button onclick="validar()">Enviar</button>

  <p id="mensagem"></p>
</div>

<script>
function validar() {
  var nome = document.getElementById("nome").value.trim();
  var idade = document.getElementById("idade").value;
  var email = document.getElementById("email").value.trim();

  // Limpa mensagem anterior
  document.getElementById("mensagem").innerText = "";

  if (nome === "" || idade === "" || email === "") {
    document.getElementById("mensagem").innerHTML = 
      '<span style="color: red;">Preencha todos os campos!</span>';
    return;
  }

  if (idade < 18) {
    document.getElementById("mensagem").innerHTML = 
      '<span style="color: red;">Você é menor de idade. Cadastro não permitido.</span>';
    return;
  }

  // Validação simples de email
  if (!email.includes("@") || !email.includes(".")) {
    document.getElementById("mensagem").innerHTML = 
      '<span style="color: red;">Por favor, insira um email válido.</span>';
    return;
  }

  // Sucesso - mensagem personalizada com o nome
  document.getElementById("mensagem").innerHTML = 
    `<span style="color: green;">Cadastro realizado com sucesso, <strong>${nome}</strong>!</span>`;
}
</script>

</body>
</html>
